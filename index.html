<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulator UTS</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      transition: 0.3s;
    }

    body.light {
      background: #f2f2f2;
    }

    body.dark {
      background: #121212;
      color: white;
    }

    .calculator {
      width: 300px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .display {
      padding: 20px;
      font-size: 24px;
      text-align: right;
      background: linear-gradient(45deg, orange, pink);
      color: white;
    }

    body.dark .display {
      background: #1e1e1e;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    button {
      padding: 20px;
      border: none;
      font-size: 18px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.8;
    }

    .operator {
      background: #ddd;
    }

    .equal {
      background: orange;
      color: white;
    }

    body.dark button {
      background: #333;
      color: white;
    }

    body.dark .operator {
      background: #444;
    }

    .toggle {
      margin-top: 10px;
      text-align: center;
    }

    .footer {
      text-align: center;
      margin-top: 15px;
      font-size: 12px;
    }

    @media (max-width: 400px) {
      .calculator {
        width: 90%;
      }
    }
  </style>
</head>

<body class="light">

  <div>
    <div class="calculator">
      <div id="display" class="display">0</div>

      <div class="buttons">
        <button onclick="clearDisplay()">AC</button>
        <button onclick="input('%')">%</button>
        <button onclick="input('/')">÷</button>
        <button onclick="input('*')">×</button>

        <button onclick="input('7')">7</button>
        <button onclick="input('8')">8</button>
        <button onclick="input('9')">9</button>
        <button onclick="input('-')">−</button>

        <button onclick="input('4')">4</button>
        <button onclick="input('5')">5</button>
        <button onclick="input('6')">6</button>
        <button onclick="input('+')">+</button>

        <button onclick="input('1')">1</button>
        <button onclick="input('2')">2</button>
        <button onclick="input('3')">3</button>
        <button rowspan="2" class="equal" onclick="calculate()">=</button>

        <button onclick="input('0')">0</button>
        <button onclick="input('.')">.</button>
      </div>
    </div>

    <div class="toggle">
      <button onclick="toggleMode()">Toggle Light/Dark</button>
    </div>

    <div class="footer">
      Muhamad Ilham Rizkyan_231011450615_05TPLE006_UTS_Pemrograman
    </div>
  </div>

  <script>
    let display = document.getElementById("display");

    function input(value) {
      // Validasi agar hanya angka & operator
      if (!isNaN(value) || "+-*/.%".includes(value)) {
        if (display.innerText === "0") {
          display.innerText = value;
        } else {
          display.innerText += value;
        }

        // Real-time hasil (opsional)
        try {
          let result = eval(display.innerText);
          console.log("Hasil sementara:", result);
        } catch {}
      }
    }

    function clearDisplay() {
      display.innerText = "0";
    }

    function calculate() {
      try {
        display.innerText = eval(display.innerText);
      } catch {
        display.innerText = "Error";
      }
    }

    function toggleMode() {
      document.body.classList.toggle("dark");
      document.body.classList.toggle("light");
    }
  </script>

</body>
</html>
